<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=", initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <form action="" style="width: 55%;height: auto ;background-color: wheat">
        <h1 style="color:rgb(1, 10, 63);">Student Registration Form</h1>
        <br><br>

        <label for="first Name"><b>First Name</b></label>
        <input type="text" placeholder="Enter Your First Name">

        <label for="last name"><b>Last Name</b></label>
        <input type="text" placeholder="Enter Your Last Name">
        <br><br>

        <label for="father name"><b>Father Name</b></label>
        <input type="text" placeholder="Enter Your Father Name">

        <label for="id card number"><b>Enter Your CNIC:</b></label>
        <input type="number" placeholder="Enter Your ID number">
        <br><br>

        <b><label for="class"><b>Enter Your Class</b></label></b>
        <input type="text" placeholder="Enter Your Class">
        <br><br>

        <label for="address"><b>Enter Your Adress:</b></label>
        <input type="text" placeholder="Enter Your Adress">
        <br><br>

        <label for="age"><b>Enter your age:</b></label>
        <input type="number" placeholder="enter age">
        <br><br>

        <label for="DOB"><b>Enter date of birth</b></label>
        <input type="date" placeholder="select dob">
        <br><br>

        <label for="Email"><b>Enter Your Email</b></label>
        <input type="email" placeholder="Enter Your Email">
        <br><br>

        <label for="educational qualification"><b>Enter Your Educational Qualification :</b></label>

        <select name="" id="">
            <option value="matric">Matric</option>
            <option value="intermediate">Intermediate</option>
            <option value="bachelors">bachelors</option>
        </select>
        <br><br>

        <label for="file"><b>Upload Your Documents </b></label>
        <input type="file" placeholder="choose document file">
        <br><br>

        <label for="range"><b>Enter Your Range:</b></label>
        <input type="range" id="range">
        <br><br>

        <textarea name="" id="" placeholder="Enter your details" rows="5" cols="75"></textarea>
        <br>

        <label for="select gender"><b>Select gender:</b></label>
        <input type="radio" name="gender" id="Male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female">
        <label for="female">female</label>
        <br><br>

        <label for="checkbox"><b>Are You a Human:</b></label>
        <input type="checkbox">
        <br>
        <br>
        <button style="background-color:lightcoral">Clear</button>
        <br><br>

        <button type="reset" style="background-color:lightblue">Reset</button>
        <button type="submit" style="background-color:lightgreen">Submit</button>
    </form>


</body>

</html>
