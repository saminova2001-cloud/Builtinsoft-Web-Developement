<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <style>
      <!--elememnt selector-->
      p{
         border: darkolivegreen ;
          padding: 1opx;
         margin: 10 px;
      }
      <!--id selector-->
      #para{
         color: wheat;
      }
      <!--class selector-->
      .bluebeggar{
         background-color: whitesmoke;
      }

      <!-- Grouping selector-->
      footer,span{
         background-color: antiquewhite;
      }

      .ford{
         background-color: yellow;
         margin: 5opx;
         padding: 20px  10px 20px 10px 20px;
         border: 10px;
      }
   </style>

</head>
<body>

   <footer>this  is the  end</footer>
   <p class=".ford">The CSS box model is a fundamental concept where every HTML element is considered a rectangular box composed of four layers: the content, padding, border, and margin.
       This model is used by browsers to determine the element's size, position, and layout on a web page.</p>





</body>
</html>
